repos:
  - repo: local
    hooks:
      - id: patch-bench-local-gate
        name: patch bench local gate
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File Maintenance/patch-bench/scripts/Invoke-LocalGate.ps1 -Gate ci
        language: system
        pass_filenames: false
      - id: patch-bench-semgrep
        name: patch bench semgrep
        entry: semgrep --config Maintenance/patch-bench/config/semgrep-rules.yaml Maintenance/patch-bench/fixtures
        language: system
        pass_filenames: false
