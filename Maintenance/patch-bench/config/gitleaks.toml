title = "patch-bench-gitleaks"

[[rules]]
id = "patch-bench-demo-leak-marker"
description = "Detect the patch bench synthetic leak marker."
regex = '''DEMO_LEAK_MARKER_DO_NOT_USE_[A-Z0-9_]{8,}'''
secretGroup = 0
tags = ["patch-bench", "synthetic"]

[allowlist]
description = "Allow documentation-only examples outside fixture scans."
paths = [
  '''CHANGELOG\.md$''',
  '''README\.md$'''
]
