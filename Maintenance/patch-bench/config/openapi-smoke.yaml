openapi: 3.1.0
info:
  title: Patch Bench Smoke API
  version: 0.1.0
paths:
  /bench/result:
    get:
      operationId: getBenchResult
      responses:
        "200":
          description: Bench result
          content:
            application/json:
              schema:
                type: object
                required:
                  - passed
                  - failed
                properties:
                  passed:
                    type: integer
                  failed:
                    type: integer
