schema_version: 1
contracts:
  - surface_id: example-process
    status: template
    startup_timeout_seconds: 30
    request_timeout_seconds: 30
    shutdown_timeout_seconds: 10
    force_kill_after_seconds: 15
    max_working_set_mb: null
    child_process_policy: command whitelist only
    environment_policy: explicit minimal variables
    rollback: restore prior wrapper or quarantined legacy path
    checks:
      - startup bounded
      - health check succeeds
      - graceful shutdown succeeds or forced fallback is recorded
