schema_version: 1
contracts:
  - surface_id: example-cli
    status: template
    command: []
    arguments: []
    stdin: none
    stdout: machine-readable when automation consumes it
    stderr: human-readable diagnostics
    exit_codes:
      success: 0
      failure: non-zero
    compatibility:
      windows_paths: required
      secrets_printed: false
    checks:
      - old and new commands run on the same safe fixture
      - stdout, stderr class, and exit code are compared
