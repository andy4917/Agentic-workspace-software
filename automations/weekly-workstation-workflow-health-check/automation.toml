prompt = "Run a report-only health check for the Codex global workstation workflows, operating system, and Memento MCP security contract. Do not mutate files, install or remove tools, archive or delete logs, edit configuration, create commits, or push changes. Inspect whether the workflow system is still healthy: hooks, final-audit behavior, MCP availability, Chrome DevTools MCP observer state, toolchain shims, Git cleanliness, log/session size thresholds, and the local harness. Run safe direct checks when practical, including the harness verification command from the workspace, PowerShell hook parser validation, `codex mcp list`, Chrome DevTools MCP toggle status if the script exists, Git status, report-only Codex maintenance checks, and `powershell.exe -NoProfile -ExecutionPolicy Bypass -File maintenance/scripts/memento-security-contract-check.ps1 -Json`. The Memento security-contract section must report RBAC default-deny status, tenant isolation forbidden SQL-pattern status, migration lint status, `test:ci` status, and README/package script alignment. Summarize pass/fail by surface, list direct checks run, checks not run with reasons, residual risks, and recommended minimal patches for any real issue. If a repair appears necessary, report it for review instead of applying it automatically."
