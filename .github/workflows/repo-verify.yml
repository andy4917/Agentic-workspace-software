name: repo-verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  repo-verify:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repository-only verification
        shell: pwsh
        run: python maintenance/scripts/codex_agent_harness.py repo-verify
