completion_gate_hook:
  priority: 5
  source: "Settings/Dev_Codex_HOOKS/completion_gate.*"
  scope_limit:
    layer: "finalization_gate"
    applies_only_when: "agent_finalizes_executable_or_procedural_artifact_or_claims_completion"
    applies_to:
      - code
      - scripts
      - tests
      - configuration
      - automation
      - build_deploy_logic
      - runbooks
      - agent_instructions
      - hook_or_policy_text_intended_for_runtime_use
    excluded_contexts:
      - ordinary_conversation
      - explanation
      - planning
      - analysis
      - translation
      - question_answering
      - draft_output
      - implementation_status_without_completion_claim
      - non_final_intermediate_output
    completion_claim_triggers:
      - done
      - completed
      - fixed
      - implemented
      - applied
      - ready
      - verified
      - tests_passed
      - all_good
      - usable
      - 완료
      - 수정_완료
      - 구현_완료
      - 적용_완료
      - 검증_완료
      - 통과
    completion_claim_requires:
      - relevant_paths
      - spec_relation
      - dynamic_input_or_condition_processing_output_or_effect_reproduction
      - checks_actually_run_or_explicit_not_run_statement
      - changed_artifacts_connected_surfaces_checked_against_latest_change
      - task_classification_receipt_current
      - need_resolution_receipt_current
      - required_route_resolver_outputs_known_or_not_applicable
      - required_routes_satisfied_by_usage_report_check_or_explicit_unavailable_or_not_applicable
      - pm_accountability_report_when_required_routes_exist
      - required_tool_routes_satisfied_or_explicitly_unavailable_or_not_applicable
      - required_subagent_inspections_reported_or_explicitly_not_applicable
      - warnings_or_limits
      - current_turn_or_attempt_freshness
      - agent_completion_receipt_is_candidate_input_only
      - gate_issued_completion_receipt_current
      - affected_paths
      - latest_artifact_hash_or_modified_timestamp
      - validation_timestamp_after_last_relevant_write
      - validation_timestamp_not_future_dated
      - allowed_clock_skew_seconds_explicit
      - tool_usage_event_ledger_v2_for_required_routes
      - repo_gate_adoption_receipt_when_gate_adoption_is_claimed
    invalid_completion_routes:
      - bare_pass_fail_claim
      - bare_test_success
      - fake_test
      - hidden_warning
      - fixed_case_only_success
      - hardcoded_pass_value
      - altered_definition
      - manipulated_evaluation_path
      - test_specific_shortcut
      - pass_fail_string_without_path_linked_spec_evidence
    failure_scope: "discard_only_affected_artifact_from_current_attempt_and_redo_with_normal_logic"
    snapshot_fallback:
      enabled: true
      purpose: "Catch finalization contamination from subagent, plan-like, nonstandard write, or final-answer artifact paths that may not invoke PreToolUse."
      must_not:
        - inspect_all_conversation_as_failure
        - rejudge_every_tool_action
        - fail_ordinary_explanation
        - discard_whole_session
        - discard_unrelated_clean_artifacts
    receipt_freshness:
      required: true
      must_match:
        - current_turn_fingerprint
        - current_attempt_id
        - affected_paths
        - artifact_sha256_hashes
        - validation_timestamp_utc_after_latest_write
      stale_receipt_is_not_completion: true
      allowed_clock_skew_seconds: 5
  states:
    - not_started
    - in_progress
    - candidate
    - blockers
    - verified_complete
  actions:
    - classify_completion_state_before_final
    - verify_oracle_match
    - verify_scope_match
    - verify_no_blockers
    - verify_no_protected_surface_violation
    - verify_direct_evidence_when_practical
    - verify_dynamic_input_processing_output_reproduction
    - verify_dependency_alignment_against_latest_changed_artifacts
    - verify_task_classification_receipt_current_and_not_downshifted
    - verify_need_resolution_receipt_current_and_no_unknown_need
    - verify_required_route_resolver_output_satisfied_before_route_specific_checks
    - verify_pm_accountability_report_before_completion_claim_when_required_routes_exist
    - verify_required_tool_routes_against_tool_usage_events_and_receipt
    - verify_required_subagent_inspection_routes_against_jobs_reports_and_candidate_only_ledger
    - verify_path_linked_spec_relation
    - verify_completion_receipt_freshness
    - treat_agent_written_completion_receipt_as_candidate_input
    - issue_gate_issued_completion_receipt_from_stop_gate_after_all_checks_pass
    - reject_completion_without_current_gate_issued_completion_receipt
    - reject_verified_complete_if_active_contract_is_not_verified_complete
    - reject_verified_complete_if_completion_receipt_is_not_verified_complete
    - reject_verified_complete_if_receipt_blockers_are_non_empty
    - reject_missing_completion_receipt
    - reject_completion_without_dynamic_reproduction_evidence
    - reject_completion_without_dynamic_reproduction_paths
    - reject_completion_without_dependency_alignment_check
    - reject_completion_when_dependency_alignment_failed
    - reject_completion_without_dependency_alignment_evidence
    - reject_completion_without_task_classification_receipt
    - reject_completion_when_task_classification_unknown_or_downshifted
    - reject_completion_without_need_resolution_receipt
    - reject_completion_when_need_resolution_unknown
    - reject_completion_when_required_route_unsatisfied
    - reject_completion_when_pm_accountability_missing_or_failed
    - reject_completion_when_required_tool_route_lacks_usage_event_check_or_explicit_unavailable_report
    - reject_completion_when_required_subagent_not_spawned
    - reject_completion_when_subagent_report_missing
    - reject_completion_when_subagent_report_invalid_envelope
    - reject_completion_when_subagent_report_without_job_id
    - reject_completion_when_subagent_report_quarantined
    - reject_completion_when_subagent_report_terminated
    - reject_completion_when_pm_adopted_tainted_subagent_output
    - stop_and_report_when_subagent_replacement_limit_reached
    - break_required_subagent_not_spawned_or_report_missing_retry_loop_without_discarding_unrelated_artifacts
    - reject_stale_completion_receipt_turn_fingerprint
    - reject_completion_receipt_without_freshness
    - reject_completion_receipt_with_stale_artifact_hash
    - reject_completion_receipt_with_validation_before_latest_write
    - reject_future_dated_completion_receipt_validation_timestamp
    - preserve_explicit_allowed_clock_skew_for_short_clock_drift
    - reject_reward_signal_completion_without_counterexample_review
    - reject_control_plane_completion_without_post_change_review
    - reject_reward_hacking_contamination_from_stop_snapshot_fallback
    - break_required_tool_not_used_retry_loop_without_discarding_unrelated_artifacts
    - discard_only_affected_artifact_when_reproduction_fails
    - emit_failed_state_report_with_blocker_id_reason_code_and_why
    - block_completion_if_candidate_when_completion_is_claimed
    - allow_non_completion_stop_snapshot_to_prevent_hook_prompt_loop
  fail_policy: "CANDIDATE_OR_BLOCKED_NOT_COMPLETE"
