pre_command_guard_hook:
  priority: 2
  source: "Settings/Dev_Codex_HOOKS/pre_command_guard.*"
  scope_limit:
    layer: "action_safety_gate"
    not_a_completion_evidence_gate: true
    priority_order:
      - absolute_deny
      - authorized_control_plane_repair
      - heuristic_contamination_deny
      - normal_work_allow
    must_not_block:
      - ordinary_conversation
      - explanation
      - planning
      - analysis
      - translation
      - read_only_inspection
      - normal_implementation_work
      - normal_product_code_edits
      - normal_spec_reflecting_tests
      - hook_read_apply_report_or_check
      - global_or_system_contract_paths_without_separate_workflow_document
      - missing_required_tool_route_evidence
      - missing_required_subagent_inspection_report
    block_only:
      - secret_auth_token_key_access_or_exfiltration_without_explicit_user_instruction
      - destructive_side_effect_without_explicit_user_instruction
      - unauthorized_hook_or_control_plane_mutation
      - enforcement_disable_bypass_weaken_or_hidden_failure_path
      - disabling_or_weakening_tests_validation_ci_lint_hooks_permissions_or_evaluators
      - manipulating_pass_fail_surfaces
      - hiding_warnings_errors_failed_checks_or_non_zero_exit_codes_to_claim_success
      - changing_finalization_or_enforcement_definitions_without_explicit_user_instruction
      - hardcoded_pass_strings_fixture_only_returns_evaluator_specific_branches_or_environment_bypasses
      - fake_frontend_or_backend_business_data_used_as_product_behavior
      - legacy_frontend_surface_resurrection_after_user_rejected_it
      - repo_local_agent_authority_or_tracked_gate_receipt_contamination
      - backend_test_specific_or_static_success_branches
    workflow_document_resolution:
      repo_documented_workflow_means_present_current_repo_workflow_or_user_named_workflow: true
      missing_optional_global_workflow_document_is_not_a_blocker: true
      do_not_prompt_user_that_global_workflow_document_path_could_not_be_read_unless_exact_file_was_requested: true
    finalization_evidence_check: "not_performed_by_pretooluse"
    required_tool_route_check: "Stop/completion_gate only; PreToolUse may record observations but must not block ordinary work for missing required-tool evidence."
    task_classification_check: "Class 0-2 remains Stop-lightweight; Class 3/4 mutating control-plane actions require current task_classification_receipt before PreToolUse allows the write."
    need_resolution_check: "Class 3/4 mutating control-plane actions require current need_resolution_receipt and required_route_resolver result before PreToolUse allows the write."
    subagent_inspection_check: "Class 3/4 mutating control-plane actions require required subagent job envelopes to be scheduled before the write; subagent reports remain Stop/finalization evidence only."
    pm_orchestration_preflight:
      applies_to_classes: ["Class 3", "Class 4"]
      applies_to_mutating_surfaces:
        - hook
        - runtime
        - receipt
        - ledger
        - AGENTS
        - workflow
        - CI
        - security
        - completion_gate
        - reward_signal_filter
      required_before_write:
        - current_user_intent_contract
        - task_classification_receipt
        - need_resolution_receipt
        - required_route_resolver_result
        - required_subagent_jobs_scheduled
        - pm_decision_ledger_initialized
      missing_preflight_reason_code: "pm_orchestration_preflight_missing"
      missing_jobs_reason_code: "required_subagent_jobs_not_scheduled"
      report_requirement_layer: "Stop only"
    repair_scope:
      enabled_when: "current_user_request_explicitly_targets_hook_policy_or_control_plane_repair"
      reason: "user_requested_hook_policy_repair"
      allowed_paths:
        - "C:/Users/anise/.codex/Dev_Codex_App_GlobalSSOT/Settings/Dev_Codex_HOOKS/"
        - "C:/Users/anise/.codex/Dev_Codex_App_GlobalSSOT/Settings/Codex_App_DECLARATIVE/"
        - "C:/Users/anise/.codex/Dev_Codex_App_GlobalSSOT/Settings/Codex_App_RUNTIME/runtime_state.schema.json"
        - "C:/Users/anise/.codex/hooks.json"
      required_properties:
        - current_task_scoped
        - path_in_allowlist
        - repair_strengthen_clarify_or_align_intent
        - not_disable_bypass_weaken_ignore_or_suppress
        - validation_receipt_required
    doc_surface:
      changelog: non_runtime_record
      readme: non_runtime_explanation
      audit_note: non_runtime_record
      runbook: procedural_artifact
      policy_doc: procedural_artifact
      hook_config: control_plane_artifact
    finalization_surface_detection:
      applies_to:
        - code
        - scripts
        - tests
        - configuration
        - automation
        - build_logic
        - runbooks
        - agent_instructions
      excluded_contexts:
        - ordinary_conversation
        - explanation
        - planning
        - analysis
        - translation
        - read_only_inspection
        - normal_implementation_work
        - non_final_intermediate_output
    hook_self_mutation_rule: "The agent may read, apply, report, and check this hook, but may not modify, disable, bypass, reinterpret, or alter its enforcement meaning without explicit user instruction."
    dynamic_reproduction_rule_owner: "Stop/completion_gate"
  actions:
    - reject_hardcoded_command
    - reject_model_invented_privileged_command
    - allow_ordinary_conversation_explanation_planning_analysis_translation
    - allow_current_task_scoped_read_only_inspection
    - allow_normal_implementation_work
    - allow_normal_spec_reflecting_tests
    - allow_hook_read_apply_report_or_check
    - allow_only_declared_config_command
    - allow_only_package_script_command
    - allow_only_repo_documented_workflow_command
    - allow_only_user_explicit_command
    - check_protected_surface_access
    - check_destructive_action
    - check_secret_or_credential_touch
    - detect_reward_hacking_path
    - detect_actual_project_vibe_coding_contamination_patterns
    - block_fake_frontend_backend_business_data
    - block_legacy_frontend_surface_resurrection
    - block_repo_local_agent_authority_or_gate_receipt_contamination
    - block_backend_test_specific_or_static_success
    - block_hardcoded_or_fake_success_path
    - block_validation_harness_touch
    - block_completion_definition_tamper
    - block_verification_bypass
    - classify_frequent_work_commands_as_reward_signal_filtered
    - set_completion_receipt_candidate_until_counterexample_review
    - detect_control_plane_mutation
    - require_current_task_scope_for_control_plane_mutation
    - require_repair_scope_token_for_control_plane_keyword_precedence
    - require_control_plane_path_allowlist
    - classify_authorized_control_plane_repair_as_normal_work
    - classify_non_runtime_documentation_record_as_keyword_observation
    - classify_detected_contamination_cleanup_as_normal_work
    - classify_current_task_runtime_state_update_as_normal_work
    - allow_non_finalization_actions_as_observation
    - do_not_check_completion_evidence_in_pretooluse
    - require_pm_orchestration_preflight_for_class3_class4_mutating_control_plane_actions
    - require_required_subagent_jobs_scheduled_before_class3_class4_mutating_control_plane_actions
    - do_not_check_required_subagent_report_in_pretooluse
    - keep_finalization_surface_manipulation_blocked
    - keep_reward_hacking_patterns_blocked_for_non_control_plane_work
    - set_completion_receipt_candidate_until_control_plane_review
    - keep_plain_search_as_observation_not_reward_signal
    - report_failed_state_with_blocker_id_reason_code_and_why
  fail_policy: "BLOCKED"
