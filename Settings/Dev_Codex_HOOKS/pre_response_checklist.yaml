pre_response_checklist_hook:
  priority: 3
  source: "Settings/Dev_Codex_HOOKS/pre_response_checklist.*"
  checks:
    - exact_output_requested
    - higher_constraint_conflict
    - previous_instruction_preserved
    - semantic_judgment_or_output_execution
    - self_score_test_verification_used_as_authority
    - rejected_candidate_repeated
    - completion_criteria_met_or_candidate_only
    - user_desired_completion_state
    - allowed_scope
    - forbidden_global_surface
    - oracle_identified
    - active_contract_state_matches_verified_complete
    - completion_receipt_state_matches_verified_complete
    - completion_receipt_is_candidate_input_not_final_authority
    - gate_issued_completion_receipt_current_or_issued_by_stop_gate
    - completion_receipt_has_no_blockers
    - completion_receipt_confirms_oracle_scope_and_evidence
    - completion_receipt_validation_timestamp_not_future_dated
    - completion_receipt_confirms_dynamic_reproduction
    - dynamic_reproduction_evidence_and_paths_present
    - dependency_alignment_check_passed_for_connected_surfaces
    - dependency_alignment_evidence_and_paths_present
    - task_classification_receipt_current_and_not_downshifted
    - need_resolution_receipt_current_and_no_UNKNOWN_need
    - required_route_resolver_output_satisfied_or_explicitly_unavailable_or_not_applicable
    - pm_accountability_report_present_for_required_routes
    - required_tool_route_report_present_for_matched_routes
    - required_tool_usage_event_or_check_evidence_present_or_explicitly_unavailable
    - required_subagent_inspection_report_present_or_explicitly_not_applicable
    - subagent_inspection_report_candidate_only_not_completion_authority
    - tool_usage_event_ledger_schema_v2_for_current_attempt
    - subagent_spawn_and_report_events_record_required_candidate_fields
    - repo_gate_adoption_checked_for_current_root_when_gate_adoption_is_claimed
    - repeated_required_tool_not_used_loop_breaker_checked
    - repeated_required_subagent_not_spawned_or_report_missing_loop_breaker_checked
    - control_plane_change_review_cleared_if_authority_surface_changed
    - reward_hacking_snapshot_fallback_clean
    - candidate_or_verified_complete
    - failed_state_report_names_blocker_id_reason_code_and_why
  fail_policy: "DO_NOT_CLAIM_COMPLETE"
