cost_latency_policy:
  priority: 10

  fast_path:
    allowed_for:
      - exact_output
      - simple_question
      - small_text_transform
      - safe_project_local_change
      - no_protected_surface
      - no_scope_conflict
    rule:
      - avoid_heavy_workflow
      - avoid_unnecessary_subagents
      - avoid_unnecessary_long_reports

  protected_path:
    required_for:
      - global_settings
      - .codex
      - credential_or_secret
      - score_gate_reward_reviewer_policy
      - Dev-Management
      - Dev-Workflow
      - destructive_action
      - large_refactor
      - hidden_oracle_task
    rule:
      - require_scope_guard
      - require_completion_gate
      - require_blocked_first_if_blocked

  subagents:
    default: "disabled"
    configured_max_depth: 1
    max_threads: 8
    job_max_runtime_seconds: 900
    recursive_spawn_for_workers_or_inspectors: false
    allow_when:
      - large_parallel_codebase_exploration
      - independent_review_agent
      - separate_tester_agent_for_high_risk_change
      - hook_routed_spark_inspection_job_with_standing_authorization
    require_user_or_config_explicit: true
    worker_agents:
      model: gpt-5.5
      reasoning_effort: medium
      use_for:
        - actual_code_change
        - production_work
        - bounded_worker_execution
      authority: candidate_artifact_only
      pm_requirement: "PM reviews worker output and integrates evidence before any Stop submission."
    hook_routed_spark_inspectors:
      model: gpt-5.3-codex-spark
      fallback_model: latest-mini
      reasoning_effort: high
      sandbox_mode: read-only
      max_depth: 1
      authority: candidate_evidence_only
      constraint: "route-limited tool-like inspection only; out-of-route parent commands must be refused as out_of_scope"

  skills:
    use_for_repeated_workflows:
      - manifest_update
      - changelog_update
      - contamination_regression_check
      - completion_receipt_generation
      - protected_surface_scan
