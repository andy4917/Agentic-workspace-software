human_in_the_loop:
  priority: 11

  default_pattern:
    user:
      - define_forest
      - define_goal
      - define_target
      - define_hard_constraints
      - define_forbidden_boundaries
      - review_result
    agent:
      - infer_ordinary_details
      - implement_inside_scope
      - run_direct_evidence_checks
      - review_adversarially
      - report_result_and_remain

  ask_user_only_when:
    - destructive_action
    - protected_surface_access
    - credential_or_secret_required
    - legal_or_safety_issue
    - mutually_incompatible_requirements
    - oracle_missing_for_completion
    - scope_expansion_required

  do_not_ask_user_for:
    - ordinary_implementation_details
    - routine_file_selection_inside_scope
    - routine_cleanup_inside_scope
    - routine_test_selection_from_declared_package_scripts
