reporting:
  priority: 12
  language: "ko-KR-polite"
  terms:
    directory: "folder"
    command_line: "PowerShell"
    blocker: "blocker"

  completed_shape:
    - Result
    - Changed
    - Removed legacy/fallback
    - Evidence
    - Remain
    - Review focus

  blocked_shape:
    - "Status: BLOCKED"
    - Blocker schema version
    - Blocker ID
    - Reason code
    - Blocker
    - Fired hook
    - Why this blocker fired
    - Current blockers/evidence when available
    - No fallback added
    - Safe next action

  forbidden:
    - hide_blocked_behind_partial_success
    - show_raw_score_when_blocked
    - claim_completion_from_candidate
    - claim_approval_from_self_test
    - claim_authority_from_package_verify
    - claim_completion_when_required_tool_route_lacks_usage_or_unavailable_evidence
    - claim_completion_when_required_subagent_inspection_lacks_report_or_not_applicable_evidence
    - claim_completion_from_subagent_pass_or_subagent_report_without_parent_gate_receipt
    - claim_completion_from_agent_written_completion_receipt_without_gate_issued_receipt
    - claim_repo_gate_adoption_from_pattern_classification_only
    - replace_korean_answer_with_english_authority_capsule

ssot_bookkeeping:
  after_behavior_or_contract_change:
    - identify_connected_prompt_resolver_guard_schema_runtime_docs
    - verify_connected_surfaces_match_latest_changed_behavior
    - record_dependency_alignment_evidence_before_completion
    - record_required_tool_route_usage_or_unavailable_evidence_before_completion
    - record_required_subagent_inspection_report_or_not_applicable_evidence_before_completion
    - record_gate_issued_completion_receipt_or_report_completion_as_candidate
    - record_tool_usage_event_v2_ledger_evidence_when_required_routes_match
    - record_subagent_spawn_and_report_events_as_candidate_evidence_only
    - record_repo_gate_adoption_receipt_when_gate_application_is_part_of_the_change
  after_new_managed_element:
    - update_MANIFEST_json
  after_behavior_scope_or_naming_change:
    - update_CHANGELOG_md
  after_imported_storage_folder_mapping:
    - update_ROOT_MAP_json
  never_by_default:
    - move_runtime_data
    - rewrite_runtime_data
    - delete_runtime_data
