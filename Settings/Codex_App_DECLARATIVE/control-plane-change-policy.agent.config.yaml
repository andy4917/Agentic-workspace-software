control_plane_change_policy:
  priority: 11
  purpose: "Prevent reward pursuit or rule frustration from mutating authority, hook, policy, or runtime schema surfaces without current user scope and post-change review."

  threat_model:
    strongest_reward_signal_can_target_policy_surface: true
    hook_or_operating_value_changes_are_high_impact: true
    broad_active_scope_can_hide_authority_mutation: true
    overblocking_product_work_is_avoided_by_mutation_only_scope: true

  protected_control_plane_paths:
    - Settings/Dev_Codex_HOOKS/codex-ssot-hook.ps1
    - Settings/Dev_Codex_HOOKS/*.yaml
    - Settings/Codex_App_DECLARATIVE/clean-slate.agent.config.toml
    - Settings/Codex_App_DECLARATIVE/*.agent.config.yaml
    - Settings/Codex_App_DECLARATIVE/reward-signal-filter.agent.config.yaml
    - Settings/Codex_App_DECLARATIVE/control-plane-change-policy.agent.config.yaml
    - Settings/Codex_App_DECLARATIVE/agent-reliability-tests.agent.config.yaml
    - Settings/Codex_App_RUNTIME/runtime_state.schema.json
    - MANIFEST.json
    - ROOT_MAP.json
    - AGENTS.md
    - AGENTS.override.md
    - C:/Users/anise/.codex/hooks.json
    - C:/Users/anise/.codex/config.toml
    - C:/Users/anise/.codex/agents/*.toml

  allowed_without_review:
    - read_only_inspection
    - read_only_runtime_reference_inspection_for_triggered_skills_plugins_and_generated_artifacts
    - schema_parse_or_yaml_json_validation
    - hook_probe_with_NoLog
    - ordinary_product_code_changes_outside_control_plane
    - runtime_receipt_update_by_the_hook_runner
    - append_only_subagent_inspection_job_or_ledger_event_by_the_hook_runner

  pre_control:
    on_control_plane_mutation:
      - require_current_user_goal_to_explicitly_name_hook_rule_system_policy_or_operating_value_change
      - require_mutation_to_stay_inside_active_scope
      - set_completion_receipt_to_candidate
      - add_control_plane_mutation_review_pending_blocker
      - mark_protected_surface_touched_until_review_clears_it
      - keep_raw_score_visible_false
      - keep_rewardable_false

  clearing_required:
    - list_touched_control_plane_files
    - separate_necessary_changes_from_excessive_or_unneeded_changes
    - verify_no_credential_secret_auth_or_unrelated_global_surface_touch
    - verify_no_scope_broadening_to_make_the_guard_pass
    - run_direct_parse_schema_or_hook_NoLog_checks_for_changed_control_plane_files
    - verify_spark_inspectors_are_route_limited_read_only_candidate_evidence
    - clear_control_plane_change_review_pending

  forbidden:
    - change_hooks_or_policy_to_bypass_a_blocker_for_convenience
    - broaden_active_scope_only_to_make_a_command_pass
    - treat_control_plane_patch_as_complete_without_post_change_review
    - mix_product_feature_work_with_unrequested_authority_surface_changes
