[meta]
mode = "clean_slate"
zero_legacy = true
zero_fallbacks = true
backward_compatibility = false
legacy_import = false
legacy_bridge = false
compatibility_adapter = false
authoritative_replacement = true

[ssot]
root_name = "Dev_Codex_App_GlobalSSOT"
canonical_root_under_user_codex = true
manifest_required_for_new_managed_elements = true
changelog_required_for_behavior_scope_or_naming_change = true
root_map_required_for_imported_storage_folders = true
do_not_move_runtime_data_by_default = true

[authority]
user_instruction_is_task_oracle = true
full_access_is_authorization = false
scores_are_authority = false
tests_are_authority = false
pass_labels_are_authority = false
clean_room_verify_is_authority = false
package_verify_is_authority = false
self_verification_is_approval = false
final_output_is_completion = false
previous_assistant_claim_is_authority = false

[execution]
agent_mode_full_access_is_permission = false
hardcoded_commands = false
generated_commands_allowed = false
model_invented_privileged_commands = false
command_without_declared_source = "BLOCKED"
allowed_command_sources = [
  "user_explicit_instruction",
  "declared_config",
  "package_script",
  "repo_documented_workflow"
]
repo_documented_workflow_requires_current_repo_declaration = true
missing_optional_global_workflow_document_is_blocker = false

[required_tool_routes]
table = "Settings/Codex_App_DECLARATIVE/required-tool-routes.json"
missing_route_evidence_blocks_pretooluse = false
missing_route_evidence_blocks_completion_claim = true
reason_code = "required_tool_not_used"
loop_breaker_on_same_prompt_attempt_without_artifact_or_evidence_change = true
failure_scope = "discard_only_affected_artifact_from_current_attempt"
subagent_pass_is_candidate_only = true

[gate_issued_receipt]
agent_completion_receipt_is_candidate_input_only = true
issuer = "codex-ssot-hook"
issued_by_hook = "completion_gate"
path = "Settings/Codex_App_RUNTIME/gate_issued_completion_receipt.json"
source_receipt_path = "Settings/Codex_App_RUNTIME/completion_receipt.json"
required_for_completion_claim = true
source_receipt_fingerprint_must_match = true
future_dated_validation_timestamp_blocks_completion = true

[event_ledger]
schema_version = "tool_usage_event.v2"
path = "Settings/Codex_App_RUNTIME/tool_usage_events.jsonl"
append_only = true
observation_layers = [
  "PostToolUse",
  "PreToolUse equivalent observation"
]
required_for_matching_required_tool_routes = true

[repo_gate_adoption]
config = "Settings/Codex_App_DECLARATIVE/repo-gate-adoption.agent.config.yaml"
receipt = "Settings/Codex_App_RUNTIME/repo_gate_adoption_receipt.json"
script = "Maintenance/Test-RepoGateAdoption.ps1"
pattern_classification_is_candidate_only = true
verified_adoption_requires_actual_hook_wiring = true

[slash_commands]
goal = true
goal_feature_key = "features.goals"

[codex_config_authority]
user_config = "%USERPROFILE%\\.codex\\config.toml"
current_hook_feature_key = "features.hooks"
deprecated_hook_feature_key = "features.codex_hooks"
current_goal_feature_key = "features.goals"
non_feature_goal_command_key = "features.goal_command_enabled"
project_config_precedence_is_documented = true
project_configs_must_not_reintroduce_deprecated_hook_key = true
project_configs_must_not_reintroduce_non_feature_goal_command_key = true
historical_state_is_not_config_authority = true
backup_files_are_not_config_authority = true
diagnostic_source_must_be_active_config_layers = true
docs_conflict_observed_2026_05_08 = true
official_docs_still_list_codex_hooks = true
local_app_warning_prefers_hooks = true
verification_script = "Maintenance/Test-CodexConfigAuthority.ps1"
runtime_receipt = "Settings/Codex_App_RUNTIME/codex_config_authority_receipt.json"
session_start_live_status_required = true
runtime_capability_receipt_must_include_config_authority = true
user_config_must_set_goals_true = true
hook_handler_timeout_key = "timeout"
hook_handler_status_message_key = "statusMessage"
legacy_runtime_metadata_keys_are_not_config_input = ["timeout_sec", "status_message"]
desktop_app_notice_cache_or_internal_override_must_be_classified = true
desktop_app_post_start_deprecation_can_be_internal_override = true
desktop_app_package_internal_legacy_override_must_be_reported = true
desktop_app_package_internal_legacy_override_observed_2026_05_08 = true
desktop_hook_ui_surface_verification_script = "Maintenance/Test-CodexHookUiSurface.ps1"
desktop_hook_ui_surface_runtime_receipt = "Settings/Codex_App_RUNTIME/codex_hook_ui_surface_receipt.json"
desktop_hook_ui_compact_summary_icon_suppression_must_be_reported = true

[protected_surfaces]
default = "BLOCK_UNLESS_EXPLICITLY_SCOPED_BY_USER_FOR_CURRENT_TASK"
route_around = false
items = [
  "user_home_global_config",
  ".codex",
  "codex_global_state",
  "agent_authority_files",
  "memory_files",
  "score_gate_reward_reviewer_policy",
  "validation_harness",
  "test_harness",
  "completion_definition",
  "credentials_tokens_secrets_auth_config",
  "environment_wide_settings",
  "authority_control_plane",
  "hook_runner_or_hook_config",
  "runtime_state_schema",
  "global_control_plane",
  "other_repositories",
  "unrelated_workspaces",
  "global_package_or_tool_configuration"
]

[reward]
only_verified_user_goal_completion = true
self_test_pass = 0
checklist_pass = 0
self_review_pass = 0
counterexample_search_pass = 0
policy_quote = 0
long_explanation = 0
confidence_statement = 0
raw_score = 0
final_message = 0
penalize_scope_expansion = true
penalize_protected_surface_access_without_scope = true
penalize_hidden_blocker = true
penalize_self_certification = true
penalize_fallback_or_backward_compatibility = true

[work_budget]
assume_time_and_resources_sufficient = true
complete_all_in_scope_work_without_omission = true
premature_stop_for_convenience = false
partial_completion_as_final = false
optimize_latency_over_completion = false
ask_user_due_to_effort_or_time = false
stop_only_when = [
  "verified_complete",
  "BLOCKED_BY_SCOPE_AUTHORITY_SAFETY_OR_EXTERNAL_DEPENDENCY"
]

[completion]
states = [
  "not_started",
  "in_progress",
  "candidate",
  "blockers",
  "verified_complete"
]
candidate_is_complete = false
final_output_is_completion = false
requires_oracle = true
requires_scope_match = true
requires_no_blockers = true
requires_direct_evidence_when_practical = true
blocked_must_be_reported_first = true

[blocker_schema]
version = "blocker_schema.v1"
required_report_fields = [
  "schema_version",
  "blocker_id",
  "reason_code",
  "fired_blocker",
  "why",
  "safe_next_action"
]

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STATE_MISSING"
reason_code = "completion_state_missing"
user_facing_blocker = "completion_state_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STATE_BLOCKERS"
reason_code = "state_blockers"
user_facing_blocker = "state_blockers"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STATE_CANDIDATE"
reason_code = "state_candidate"
user_facing_blocker = "state_candidate"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STATE_NOT_VERIFIED"
reason_pattern = "^state_(.+)$"
user_facing_blocker = "$reason"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.RECEIPT_MISSING"
reason_code = "completion_receipt_missing"
user_facing_blocker = "completion_receipt_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.ORACLE_NOT_MATCHED"
reason_code = "oracle_not_matched"
user_facing_blocker = "oracle_not_matched"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.SCOPE_NOT_MATCHED"
reason_code = "scope_not_matched"
user_facing_blocker = "scope_not_matched"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.SCOPE.PROTECTED_SURFACE_TOUCHED"
reason_code = "protected_surface_touched"
user_facing_blocker = "protected_surface_touched"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DIRECT_EVIDENCE_MISSING"
reason_code = "direct_evidence_missing"
user_facing_blocker = "direct_evidence_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DYNAMIC_REPRODUCTION_CHECK_MISSING"
reason_code = "dynamic_reproduction_check_missing"
user_facing_blocker = "dynamic_reproduction_check_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DYNAMIC_REPRODUCTION_FAILED"
reason_code = "dynamic_reproduction_failed"
user_facing_blocker = "dynamic_reproduction_failed"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DYNAMIC_REPRODUCTION_EVIDENCE_MISSING"
reason_code = "dynamic_reproduction_evidence_missing"
user_facing_blocker = "dynamic_reproduction_evidence_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DEPENDENCY_ALIGNMENT_CHECK_MISSING"
reason_code = "dependency_alignment_check_missing"
user_facing_blocker = "dependency_alignment_check_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DEPENDENCY_ALIGNMENT_FAILED"
reason_code = "dependency_alignment_failed"
user_facing_blocker = "dependency_alignment_failed"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.DEPENDENCY_ALIGNMENT_EVIDENCE_MISSING"
reason_code = "dependency_alignment_evidence_missing"
user_facing_blocker = "dependency_alignment_evidence_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.REQUIRED_TOOL_NOT_USED"
reason_code = "required_tool_not_used"
user_facing_blocker = "required_tool_not_used"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STALE_RECEIPT"
reason_code = "stale_completion_receipt"
user_facing_blocker = "stale_completion_receipt"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.FUTURE_DATED_VALIDATION_TIMESTAMP"
reason_code = "future_dated_validation_timestamp"
user_facing_blocker = "future_dated_validation_timestamp"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.GATE_ISSUED_RECEIPT_MISSING"
reason_code = "gate_issued_completion_receipt_missing"
user_facing_blocker = "gate_issued_completion_receipt_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMPLETION.STALE_GATE_ISSUED_RECEIPT"
reason_code = "stale_gate_issued_completion_receipt"
user_facing_blocker = "stale_gate_issued_completion_receipt"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.REWARD_SIGNAL.COUNTEREXAMPLE_REVIEW_MISSING"
reason_code = "reward_signal_counterexample_review_missing"
user_facing_blocker = "reward_signal_counterexample_review_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.REWARD_HACKING.PATH_DETECTED"
reason_code = "reward_hacking_path_detected"
user_facing_blocker = "reward_hacking_path_detected"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.REWARD_HACKING.SNAPSHOT_DETECTED"
reason_code = "reward_hacking_snapshot_detected"
user_facing_blocker = "reward_hacking_snapshot_detected"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.CONTROL_PLANE.MUTATION_WITHOUT_CURRENT_TASK_SCOPE"
reason_code = "control_plane_mutation_without_current_task_scope"
user_facing_blocker = "control_plane_mutation_without_current_task_scope"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.CONTROL_PLANE.MUTATION_REVIEW_MISSING"
reason_code = "control_plane_mutation_review_missing"
user_facing_blocker = "control_plane_mutation_review_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.SCOPE.ACTIVE_SCOPE_MISSING"
reason_code = "active_scope_missing"
user_facing_blocker = "active_scope_missing"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMMAND.SOURCE_MISSING"
reason_code = "command_without_declared_source"
user_facing_blocker = "command_without_declared_source"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.COMMAND.SOURCE_NOT_ALLOWED"
reason_code = "command_source_not_allowed"
user_facing_blocker = "command_source_not_allowed"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.SECURITY.CREDENTIAL_OR_SECRET_TOUCH"
reason_code = "credential_or_secret_touch"
user_facing_blocker = "credential_or_secret_touch"

[[blocker_schema.reasons]]
blocker_id = "CONTRACT.SCOPE.PROTECTED_SURFACE_WITHOUT_EXPLICIT_SCOPE"
reason_code = "protected_surface_without_explicit_scope"
user_facing_blocker = "protected_surface_without_explicit_scope"


[exact_output]
fast_path = true
allowed_when_no_higher_conflict = true
do_not_meta_interpret_simple_exact_output = true

[retry]
enabled = true
requires_invalidation = true
repeat_rejected_logic = false
preserve_active_contract = true

[fallback]
enabled = false
legacy_path = false
silent_default_behavior = false
backward_compatibility = false
compatibility_adapter = false
route_around = false

[recovery]
allowed = [
  "mark_previous_attempt_rejected",
  "identify_failed_assumption",
  "rerun_within_same_scope",
  "report_unresolved_or_blocked"
]

[memory]
write_stable_lessons_only = true
store_rejected_answers_as_invalid = true
store_self_made_pass_as_fact = false
store_raw_score_as_fact = false
store_emotional_context_as_fact = false
store_english_authority_capsule_as_answer = false

[language]
default = "ko-KR-polite"
windows_terms = true
english_allowed_for = [
  "config_key",
  "file_name",
  "code",
  "identifier",
  "PowerShell_literal"
]
