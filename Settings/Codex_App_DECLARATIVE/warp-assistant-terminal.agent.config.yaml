warp_assistant_terminal_policy:
  status: "adopted_as_auxiliary_surface"
  installed_package:
    winget_id: "Warp.Warp"
    version: "v0.2026.04.27.15.32.stable_03"
    executable: "%LOCALAPPDATA%/Programs/Warp/warp.exe"
  purpose:
    - "Auxiliary PowerShell surface for observation, log review, and manual command ergonomics."
    - "Secondary terminal only; Codex App and Windows Terminal remain the primary execution surfaces."
  authorization_boundary:
    allowed_operators:
      - "Codex in the active user-scoped task."
      - "Subagents explicitly spawned and authorized by Codex for the active user-scoped task."
    blocked_operators:
      - "Warp Oz agents."
      - "Warp cloud agents."
      - "Warp autonomous agent execution."
      - "Unreviewed third-party or built-in Warp AI automation."
    user_plan: "Free plan only; do not upgrade, purchase credits, enable paid plans, or configure billing."
  operating_rules:
    default_terminal: false
    auxiliary_only: true
    startup_shell: "PowerShell 7 (pwsh)"
    launch_entrypoint: "%USERPROFILE%/.codex/profile.d/WarpAuxiliary.ps1"
    launch_command: "warpaux"
    launch_focus_policy: "Launch minimized and restore the previously active foreground window unless foreground use is explicitly requested."
    use_for_global_or_protected_surfaces: "Only when the user explicitly scopes that exact surface for the current task."
    codex_may_launch_warp: true
    codex_may_spawn_subagents_for_warp_tasks: true
    subagents_must_inherit_vowline: true
    subagents_must_receive_this_policy: true
  warp_ai_restrictions:
    global_ai: "Disable in Warp Settings > Agents or Settings > AI when the UI is first opened."
    active_ai: "Disable; do not use prompt suggestions, suggested code diffs, or proactive fix recommendations."
    natural_language_detection: "Disable; keep terminal input in explicit PowerShell mode."
    agent_mode: "Do not enter or use Agent Mode."
    autonomy: "Set command execution and coding permissions to the most restrictive available setting."
    codebase_context: "Disable autoindexing for this SSOT unless the user explicitly scopes a separate Git repo experiment."
    cloud_conversations: "Do not enable for this SSOT."
    mcp_servers: "Do not install, sync, or enable Warp-managed MCP servers without explicit user scope."
  privacy_and_storage:
    telemetry: "Disable Help improve Warp and crash reporting when the UI is first opened."
    network_log: "Use only for verification if needed; do not persist external account state in this SSOT."
    secrets: "Never attach credentials, tokens, auth config, or protected global state to Warp context."
  verification:
    installed_by: "winget install --id Warp.Warp --exact --accept-package-agreements --accept-source-agreements"
    verified_by:
      - "winget list --id Warp.Warp --exact --accept-source-agreements"
      - "Test-Path %LOCALAPPDATA%/Programs/Warp/warp.exe"
      - "Get-WarpAuxiliaryStatus"
      - "PowerShell profile imports %USERPROFILE%/.codex/profile.d/WarpAuxiliary.ps1."
    settings_applied:
      - "Global Warp AI disabled in settings.toml."
      - "Default session mode set to terminal in settings.toml."
      - "Cloud conversation storage disabled in settings.toml."
      - "Telemetry and crash reporting disabled in settings.toml."
      - "Warp Drive and third-party agent toolbar disabled in settings.toml."
    remaining_manual_ui_checks:
      - "Confirm Warp starts with PowerShell 7 and is not set as the default terminal after the next interactive Warp launch."
  completion_boundary:
    install_complete: true
    ssot_policy_recorded: true
    ui_restriction_state: "settings_toml_applied_manual_shell_confirmation_remaining"
