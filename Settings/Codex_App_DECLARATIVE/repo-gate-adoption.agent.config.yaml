repo_gate_adoption:
  priority: 8
  purpose: "Verify actual Codex hook gate wiring for the current repo or session target; pattern classification alone is candidate evidence."
  global_hook_config: "C:/Users/anise/.codex/hooks.json"
  hook_runner: "C:/Users/anise/.codex/Dev_Codex_App_GlobalSSOT/Settings/Dev_Codex_HOOKS/codex-ssot-hook.ps1"
  runtime_receipt: "Settings/Codex_App_RUNTIME/repo_gate_adoption_receipt.json"
  repo_v2_adoption_receipt:
    runtime_receipt: "Settings/Codex_App_RUNTIME/repo_v2_adoption_receipt.json"
    verifier: "Maintenance/Test-RepoV2AdoptionReceiptV2.ps1"
    required_fields:
      - "repo_path"
      - "git_dirty_state"
      - "active_agents_chain"
      - "checks.lint"
      - "checks.typecheck"
      - "checks.test"
      - "checks.build"
      - "required_routes"
      - "inspector_reports"
      - "contamination_scan"
      - "gate_decision"
      - "handoff_confirmation"
    gate_link:
      stop_gate_authority: "Settings/Codex_App_RUNTIME/gate_issued_completion_receipt.json"
      candidate_source: "Settings/Codex_App_RUNTIME/completion_receipt.json"
      rule: "repo_v2 gate_decision may be pending_stop_gate before Stop; gate_issued status must match the Stop-issued source completion receipt fingerprint."
  required_events:
    - event: "SessionStart"
      hook_name: "session_start"
    - event: "UserPromptSubmit"
      hook_name: "user_prompt_submit"
    - event: "PreToolUse"
      hook_name: "pre_command_guard"
    - event: "PostToolUse"
      hook_name: "post_tool_use"
    - event: "Stop"
      hook_name: "stop_checks"
  targets:
    - id: "Dev_Codex_App_GlobalSSOT"
      root: "C:/Users/anise/.codex/Dev_Codex_App_GlobalSSOT"
      adoption: "global_codex_hooks"
      expected_status: "verified"
  rules:
    - "verified_adoption_requires_actual_hook_config_wiring"
    - "dirty_repo_read_only_audit_is_candidate_only"
    - "pattern_classification_is_not_repo_adoption"
    - "repo_specific_completion_claim_requires_repo_gate_adoption_receipt_when_gate_adoption_is_part_of_the_claim"
    - "required_tool_routes_and_gate_receipt_changes_must_validate_the_current_root_wiring"
    - "repo_v2_adoption_receipt_collects_repo_git_agent_check_route_inspector_scan_gate_and_handoff_evidence"
    - "repo_v2_adoption_receipt_cannot_issue_completion_authority_without_stop_gate_issued_receipt"
