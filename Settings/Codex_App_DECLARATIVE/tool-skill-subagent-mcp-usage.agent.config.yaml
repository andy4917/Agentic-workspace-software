    rule: Run the most specific declared workflow available for the touched surface when it exists in the current repo or is explicitly named by the user. If no repo-declared workflow is present, use package scripts, standard tool checks, official source instructions, or direct evidence. If a present required workflow cannot run because a required tool is missing, state that blocker and run the closest non-mutating evidence check that still applies. Do not treat a missing optional global workflow document as a blocker.

  skills:
    use_when:
      - user_names_a_skill
      - task_matches_a_skill_description
      - skill_contains_reusable_scripts_or_templates
      - bundled_system_skill_matches_the_task
      - git_or_github_work_should_use_git_easy_korean_for_user_facing_explanations
    runtime_reference_scope:
      purpose: "Skill and plugin instruction files are runtime references, not user product scope expansions."
      read_only_paths:
        - C:\Users\anise\.codex\skills
        - C:\Users\anise\.agents\skills
        - C:\Users\anise\.codex\plugins\cache
      allowed_for:
        - loading_triggered_skill_body
        - listing_available_skill_metadata
        - reading_skill_scripts_or_templates_before_use
      must_not_allow:
        - writing_or_deleting_skill_files_without_explicit_current_task_scope
        - treating_skill_cache_read_as_completion
        - accessing_credential_or_auth_material
    required_behavior:
      - load_the_skill_body_before_applying_it
      - reuse_skill_scripts_when_available
      - propagate_vowline_for_substantive_work
      - respect_SKILL_frontmatter_name_and_description_for_triggering
      - use_git_easy_korean_when_running_or_reporting_git_work
    installed_user_skills:
      - name: git-easy-korean
        path: C:\Users\anise\.codex\skills\git-easy-korean
        trigger: Git or GitHub status, add/stage, commit, push, pull, branch, merge, conflict, rejected push, PR handoff, or any user-facing Git explanation.
        user_facing_rule: Preserve exact commands and identifiers, but explain Git outcomes in easy Korean terms such as 세이브, GitHub에 올리기, 받아오기, 작업 사본, 담아두기, and 충돌.
    config_facts:
      - include_instructions controls whether selected skills are injected.
      - bundled skills can be enabled and cached under CODEX_HOME skills system storage.
      - agents/openai.yaml is harness metadata, not agent-readable operating instructions.

  generated_artifacts:
    runtime_reference_scope:
      purpose: "Tool-generated artifacts must be inspectable after creation so direct evidence can be recorded."
      read_only_paths:
        - C:\Users\anise\.codex\generated_images
      allowed_for:
        - confirming_generated_file_exists
        - checking_size_timestamp_or_hash
        - presenting_generated_artifact_path
      must_not_allow:
        - deleting_generated_artifacts_without_user_instruction
        - broad_runtime_state_mutation
        - treating_artifact_existence_alone_as_completion_without_oracle_match

  subagents:
    configured_max_depth: 1
    max_threads: 8
    job_max_runtime_seconds: 900
    recursive_spawn_for_workers_or_inspectors: false
    use_when:
      - user_explicitly_requests_subagents_or_parallel_agent_work
      - a_bounded_sidecar_task_can_run_without_blocking_the_main_path
      - hook_routed_inspection_job_is_queued_with_standing_authorization
    required_behavior:
      - give_subagents_concrete_scope
      - avoid_duplicate_work
      - review_and_integrate_results
      - preserve_vowline_objective_constraints_evidence_and_reporting
      - inherit_parent_model_by_default
      - override_model_only_when_explicitly_requested_or_clearly_required
      - wait_only_when_the_main_path_is_blocked_on_the_result
      - close_agents_when_they_are_no_longer_needed
      - restrict_spark_inspectors_to_their_route_and_job_envelope
      - record_subagent_spawn_and_subagent_report_events_with_candidate_evidence_only_authority
      - never_treat_subagent_pass_as_completion_authority
      - never_use_subagents_to_bypass_PreToolUse_Stop_or_required_route_evidence
    worker_agents:
      primary_model: latest-main
      preferred_model: gpt-5.5
      reasoning_effort: medium
      latest_model_required: true
      actual_code_work: true
      sandbox_mode: workspace-write-scoped
      authority: candidate_artifact_only
      pm_review_required: true
    spark_inspector_roles:
      - spark_repo_inspector
      - spark_contamination_inspector
      - spark_tool_route_inspector
      - spark_frontend_inspector
      - spark_backend_inspector
      - spark_contract_inspector
    lifecycle_notes:
      - send_input queues or redirects work but does not itself create a new independent task unless the runtime tool semantics say so.
      - wait_agent may return a mailbox summary rather than final content in newer runtimes.
      - long_running_sidecar_work_needs_a_clear_handoff_or_close_action
      - Spark inspectors are tool-like bounded inspectors, not autonomous completion authorities.

  mcp:
    use_when:
      - a_connector_or_mcp_tool_has_better_direct_access_than_shell_or_web
      - repository_or_app_metadata_is_needed
      - the_user_explicitly_references_apps_connectors_or_mcp
    current_verified:
      - tool_search_loaded_github_mcp
      - github_mcp_repository_search_invoked
    discovery_rule: Use tool_search for MCP tool discovery before list_mcp_resources or list_mcp_resource_templates.
    resource_rule: Use MCP resources and resource templates for context data, not for discovering deferred tools.
    exposure_rule: Do not assume every MCP tool is directly exposed; large tool sets can be deferred and become available through tool_search.
    naming_rule: Preserve raw server/tool identity internally while relying on sanitized, deduplicated model-visible names.
    parallel_rule: Enable or rely on parallel MCP tool calls only when the server declares support and the called tools are safe to run concurrently.
    implementation_owner_for_upstream_changes:
      official_instruction: codex-rs/codex-mcp/src/mcp_connection_manager.rs
      actual_current_path: codex-rs/codex-mcp/src/connection_manager.rs

official_openai_codex_workflows:
  root_js_docs:
    evidence: package.json
    requirements:
      node: ">=22"
      pnpm: ">=10.33.0"
    checks:
      - pnpm format
    fixes:
      - pnpm format:fix

  typescript_sdk:
    evidence: sdk/typescript/package.json
    checks:
      - pnpm --dir sdk/typescript lint
      - pnpm --dir sdk/typescript test
      - pnpm --dir sdk/typescript build
      - pnpm --dir sdk/typescript format
    fixes:
      - pnpm --dir sdk/typescript lint:fix
      - pnpm --dir sdk/typescript format:fix

  rust_codex_rs:
    evidence:
      - AGENTS.md
      - docs/install.md
      - justfile
    checks:
      - just fmt
      - cargo test -p <crate>
      - just test
      - just fix -p <crate>
      - just write-config-schema
      - just write-app-server-schema
      - just bazel-lock-update
      - just bazel-lock-check
    rule: Ask before a full workspace sweep when official instructions say to ask; run scoped project checks without asking when the touched surface requires them. Use the installed Windows native Rust, Bazel, DotSlash, and Cargo helper tools; do not switch to WSL for this user.

  argument_comment_lint:
    evidence:
      - tools/argument-comment-lint/README.md
      - justfile
    requirements:
      - rustup nightly-2025-09-18 with llvm-tools-preview rustc-dev rust-src
      - cargo-dylint
      - dylint-link
      - bazel_or_prebuilt_dotslash_path
    checks:
      - just argument-comment-lint
      - just argument-comment-lint -p <crate>
      - tools/argument-comment-lint/run-prebuilt-linter.py -p <crate>
      - tools/argument-comment-lint/run.py -p <crate>
    rule: Prefer self-documenting APIs over argument comments; use exact /*param_name*/ comments for opaque positional literals only when preserving the API is the smaller correct change.

  mcp_config:
    evidence: docs/config.md
    rules:
      - MCP servers are configured under mcp_servers in config.toml.
      - MCP tools default to serialized calls.
      - supports_parallel_tool_calls is only for tools safe to run concurrently.
      - per-tool approval mode belongs under the server tool entry.
      - tool_search is the required discovery path for deferred MCP tools.
      - resource listing reads context resources and must not be substituted for tool discovery.

  agents_md:
    evidence:
      - docs/agents_md.md
      - codex-rs/core/hierarchical_agents_message.md
    rules:
      - AGENTS.md hierarchy and scope matter.
      - child_agents_md adds hierarchy guidance when enabled.
      - AGENTS.md applies to the folder containing it and child folders.
      - Deeper AGENTS.md files override higher-level AGENTS.md files for their subtree.
      - System, developer, and user instructions remain higher priority than AGENTS.md.
