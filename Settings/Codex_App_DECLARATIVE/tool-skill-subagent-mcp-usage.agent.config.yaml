name: tool-skill-subagent-mcp-usage
source:
  upstream_repo: https://github.com/openai/codex
  cloned_to: C:\Users\anise\.codex\Dev_Codex_App_GlobalSSOT\Maintenance\upstream\openai-codex
  inspected_commit: 35aaa5d9fcb606fb6f27dd5747ecab3f4ba0c07e
  primary_files:
    - AGENTS.md
    - docs/install.md
    - docs/config.md
    - docs/agents_md.md
    - package.json
    - pnpm-workspace.yaml
    - justfile
    - tools/argument-comment-lint/README.md

principle:
  capability_without_use_has_no_value: true
  tools_are_for_execution_not_decoration: true
  missing_required_tool_is_reported_as_blocker: true
  repo_documented_workflow_is_preferred_validation_path_when_present: true
  optional_global_workflow_document_is_not_required: true

required_tool_routes:
  table: Settings/Codex_App_DECLARATIVE/required-tool-routes.json
  enforcement_layer: Stop finalization only
  receipt_required: runtime_capability_receipt
  completion_receipt_is_candidate_input_only: true
  final_authority_receipt: Settings/Codex_App_RUNTIME/gate_issued_completion_receipt.json
  final_authority_issuer: codex-ssot-hook completion_gate
  usage_ledger: Settings/Codex_App_RUNTIME/tool_usage_events.jsonl
  usage_ledger_schema: tool_usage_event.v2
  pm_decision_ledger: Settings/Codex_App_RUNTIME/pm_decisions.jsonl
  pm_decision_schema: pm_decision.v1
  task_classification_receipt: Settings/Codex_App_RUNTIME/task_classification_receipt.json
  need_resolution_receipt: Settings/Codex_App_RUNTIME/need_resolution_receipt.json
  task_classification:
    basic_is_positive_allowlist: true
    ambiguous_classifies_upward: true
    missing_blocks_completion_claim: true
  need_resolution:
    resolver: required_route_resolver
    unknown_blocks_completion_claim: true
    not_required_is_computed_not_default: true
    valid_completion_evidence:
      - tool_usage_event
      - skill_usage_event
      - subagent_job_event
      - subagent_report_event
      - check_evidence
      - explicit_unavailable
      - explicit_not_applicable
    installed_configured_available_is_not_evidence: true
  skill_resolution:
    enabled: true
    route_table_section: skill_routes
    receipt: Settings/Codex_App_RUNTIME/skill_resolution_receipt.json
    usage_ledger: Settings/Codex_App_RUNTIME/skill_usage_events.jsonl
    usage_ledger_schema: skill_usage_event.v1
    upstream_source_url: https://github.com/addyosmani/agent-skills.git
    upstream_clone: C:\Users\anise\.agents\upstream\agent-skills
    installed_root: C:\Users\anise\.agents\skills
    installed_configured_available_is_not_evidence: true
    missing_required_skill_blocks_pretooluse: false
    missing_required_skill_blocks_completion_claim: true
    unknown_skill_need_blocks_completion_claim: true
    valid_completion_evidence:
      - skill_usage_event
      - explicit_unavailable
      - explicit_not_applicable
    reason_codes:
      required_skill_not_used: required_skill_not_used
      skill_need_unknown: skill_need_unknown
      installed_skill_not_evidence: installed_skill_not_evidence
      skill_verification_missing: skill_verification_missing
      worker_required_skill_not_used: worker_required_skill_not_used
      skill_resolution_receipt_missing: skill_resolution_receipt_missing
    worker_propagation:
      required_skills_in_job_envelope: true
      skill_usage_required: true
      required_output: required_outputs.skill_usage_summary
    inspector_propagation:
      skill_compliance_targets_in_job_envelope: true
      reports_remain_candidate_evidence_only: true
  pm_accountability:
    enabled: true
    enforcement_layer: Stop finalization only
    missing_pm_aggregation_blocks_pretooluse: false
    missing_pm_aggregation_blocks_completion_claim: true
    subagent_failure_is_main_agent_owned_until_resolved_or_user_waived: true
    repeated_pm_failure_action: STOP_AND_REPORT
  usage_ledger_write_policy:
    append_only: true
    writer_lock: exclusive_write_shared_read_retry
    event_id_nonce_required: true
    parent_lineage_required_when_payload_provides_thread_or_agent_parent: true
    blocked_or_failed_hook_events_recorded_in_hook_invocation_ledger: true
  missing_route_evidence_reason_code: required_route_unsatisfied
  missing_tool_evidence_reason_code: required_tool_not_used
  missing_skill_evidence_reason_code: required_skill_not_used
  pretooluse_must_not_block_missing_route_evidence: true
  loop_breaker:
    enabled: true
    trigger: same_prompt_and_attempt_repeats_required_tool_not_used_without_artifact_or_evidence_change
    action: stop_automatic_retries_and_report_missing_route_to_user
  failure_scope: discard_only_affected_artifact_from_current_attempt
  subagent_pass_policy: subagent_pass_is_candidate_evidence_parent_stop_receipt_required
  subagent_orchestration:
    max_threads: 8
    max_depth: 1
    recursive_spawn_for_workers_or_inspectors: false
    automatic_close_lifecycle:
      enabled: true
      close_when:
        - report_accepted
        - report_rejected
        - report_quarantined
        - report_terminated
        - route_satisfied
        - route_failed
      lifecycle_events:
        - auto_close_requested
        - closed
  worker_routes:
    purpose: "Actual mutating production work. Inspectors must not replace workers for write tasks."
    queue: Settings/Codex_App_RUNTIME/subagent_worker_jobs.jsonl
    reports: Settings/Codex_App_RUNTIME/subagent_worker_reports.jsonl
    primary_model: latest-main
    preferred_model: gpt-5.5
    reasoning_effort: medium
    sandbox_mode: workspace-write-scoped
    max_depth: 1
    authority: candidate_artifact_only
    pm_review_required: true
    stop_blocks_completion_for_missing_required_worker_report: true
    reason_codes:
      required_worker_not_spawned: required_worker_not_spawned
      worker_report_missing: worker_report_missing
      inspector_only_delegation_for_mutating_task: inspector_only_delegation_for_mutating_task
      pm_collapsed_worker_route_into_inspector_route: pm_collapsed_worker_route_into_inspector_route
    routes:
      implementation_worker: worker
      test_worker: worker
      config_worker: worker
      control_plane_worker: worker
      runtime_schema_worker: worker
      harness_worker: worker
  hook_routed_subagent_inspection:
    enabled: true
    queue: Settings/Codex_App_RUNTIME/subagent_inspection_jobs.jsonl
    loop_state: Settings/Codex_App_RUNTIME/subagent_inspection_loop_state.json
    standing_authorization_source: C:\Users\anise\.codex\config.toml
    authorization_marker: "SSOT standing-authorized read-only inspector"
    parent_orchestrates_spawn: true
    hooks_wait_for_subagents: false
    default_sandbox_mode: read-only
    default_max_depth: 1
    model: gpt-5.3-codex-spark
    fallback_model: latest-mini
    reasoning_effort: high
    authority: candidate_evidence_only
    tool_like_constraint: "inspectors may only act on their configured route/job envelope and must report out_of_scope otherwise"
    pretooluse_must_not_block_missing_subagent_report: true
    stop_blocks_completion_for_missing_required_subagent_report: true
    loop_breaker_reasons:
      - required_subagent_not_spawned
      - subagent_report_missing
    routes:
      repo_integrity_inspection: spark_repo_inspector
      contamination_inspection: spark_contamination_inspector
      required_tool_route_inspection: spark_tool_route_inspector
      frontend_adoption_inspection: spark_frontend_inspector
      backend_adoption_inspection: spark_backend_inspector
      ssot_contract_inspection: spark_contract_inspector
  inspector_routes:
    purpose: "Read-only route inspection. Inspector output is candidate_evidence_only and cannot perform or replace mutating worker routes."
    queue: Settings/Codex_App_RUNTIME/subagent_inspection_jobs.jsonl
    reports: Settings/Codex_App_RUNTIME/subagent_inspection_reports.jsonl
    model: gpt-5.3-codex-spark
    fallback_model: latest-mini
    reasoning_effort: high
    sandbox_mode: read-only
    max_depth: 1
    authority: candidate_evidence_only
    routes:
      repo_integrity_inspection: spark_repo_inspector
      contamination_inspection: spark_contamination_inspector
      required_tool_route_inspection: spark_tool_route_inspector
      frontend_adoption_inspection: spark_frontend_inspector
      backend_adoption_inspection: spark_backend_inspector
      ssot_contract_inspection: spark_contract_inspector
  freshness_policy:
    validation_timestamp_must_not_be_future_dated: true
    future_timestamp_reason_code: future_dated_validation_timestamp
    allowed_clock_skew_seconds: 5
  repo_gate_adoption:
    config: Settings/Codex_App_DECLARATIVE/repo-gate-adoption.agent.config.yaml
    receipt: Settings/Codex_App_RUNTIME/repo_gate_adoption_receipt.json
    verification_script: Maintenance/Test-RepoGateAdoption.ps1
    verified_adoption_requires_actual_hook_wiring: true
    pattern_classification_is_candidate_only: true

workflow_document_resolution:
  purpose: Prevent agents from treating an absent global workflow document file as required when global instructions, system policy, and the active contract already define the operating path.
  resolver_order:
    - current_user_explicit_instruction
    - system_developer_project_agent_contract
    - current_repo_AGENTS_or_agent_instructions
    - current_repo_package_scripts_or_declared_workflows
    - official_source_docs_for_the_touched_surface
  required_only_when:
    - user_explicitly_names_the_workflow_document_path_for_the_current_task
    - current_repo_manifest_or_agent_instructions_declare_that_exact_file_as_required
    - current_repo_package_or_tool_command_requires_that_file_to_execute
  absence_policy:
    missing_optional_global_workflow_document_is_blocker: false
    do_not_report_missing_global_workflow_document_as_user_actionable: true
    do_not_say_global_workflow_document_path_could_not_be_read_unless_user_requested_that_exact_file: true
    continue_with_global_instructions_system_policy_active_contract_and_direct_evidence: true

